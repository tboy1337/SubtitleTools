name: "Build-Release-PYPI"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  release-gate:
    name: Detect version bump
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Compare pyproject.toml version with previous commit
        id: check
        run: |
          CURRENT=$(python -c "import tomllib; from pathlib import Path; print(tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])")
          PREVIOUS=$(git show HEAD^:pyproject.toml 2>/dev/null | python -c "import sys, tomllib; print(tomllib.loads(sys.stdin.read())['project']['version'])" 2>/dev/null || true)
          if [ -n "$CURRENT" ] && [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "tag=v$CURRENT" >> "$GITHUB_OUTPUT"

  quality:
    name: Quality checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Run verification suite
        run: python scripts/verify.py

      - name: Upload coverage report
        if: matrix.python-version == '3.14'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  build-windows:
    needs: [quality, release-gate]
    if: needs.release-gate.result == 'success' && needs.release-gate.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Read package version
        id: version
        shell: pwsh
        run: |
          python -c "import tomllib; from pathlib import Path; data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8')); print('version=' + data['project']['version'])" >> $env:GITHUB_OUTPUT

      - name: Create virtual environment
        run: python -m venv venv

      - name: Install dependencies in virtual environment
        run: |
          .\venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip setuptools wheel pyinstaller
          python -m pip install -e .
        shell: pwsh

      - name: Generate version info file
        run: |
          .\venv\Scripts\Activate.ps1
          python scripts/generate_file_version_info.py
        shell: pwsh

      - name: Build executable
        run: |
          .\venv\Scripts\Activate.ps1
          pyinstaller SubtitleTools.spec
        shell: pwsh

      - name: Rename executable
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Rename-Item -Path dist/SubtitleTools.exe -NewName "SubtitleTools-v$version-windows.exe"

      - name: Zip the exe
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path "dist/SubtitleTools-v$version-windows.exe" -DestinationPath "dist/SubtitleTools-v$version-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: dist/SubtitleTools-v${{ steps.version.outputs.version }}-windows.zip

      - name: Smoke test executable
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $exe = "dist/SubtitleTools-v$version-windows.exe"
          & $exe --version

  build-wheels:
    name: Build Python wheels
    needs: [quality, release-gate]
    if: needs.release-gate.result == 'success' && needs.release-gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel build

      - name: Build pure Python wheel and sdist
        run: python -m build

      - name: Smoke test wheel install
        run: |
          python -m pip install dist/*.whl
          subtitletools --version

      - name: Store artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: dist/

  create-release:
    needs: [build-windows, build-wheels, release-gate]
    if: needs.release-gate.result == 'success' && needs.release-gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download Windows build
        uses: actions/download-artifact@v8
        with:
          name: windows-build
          path: ./build

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ./build/SubtitleTools-v${{ needs.release-gate.outputs.version }}-windows.zip
          tag: ${{ needs.release-gate.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          removeArtifacts: true

  publish-pypi:
    name: Publish wheels to PyPI
    needs: [build-wheels, quality, release-gate]
    if: needs.release-gate.result == 'success' && needs.release-gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Twine
        run: python -m pip install --upgrade pip twine

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_SUBTITLTOOLS }}
        run: |
          twine check dist/*
          twine upload --skip-existing dist/*
